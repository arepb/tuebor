title: Tuebor
description: An honor-pledge commitment by the people who really love Michigan.
home_title: "Tuebor — Michigan Investment Pledge"
keywords: "Michigan investors, Michigan startups, invest in Michigan, Michigan investment pledge, Michigan venture capital, Michigan entrepreneurs"
baseurl: ""
url: https://tuebor.org

favicon_ico: "/assets/images/favicon.ico"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - BRAND.md
  - CLAUDE.md
  - index-test.md
  - qa-screenshots
  - vendor
  - _sass
  - _includes/components
  - _includes/css
  - _includes/icons
  - _includes/js
  - _includes/lunr
  - _includes/vendor
  - assets/images/pledgees/_sources

collections:
  pledgees:
    output: true
    permalink: /roster/:slug/

defaults:
  - scope:
      path: ""
      type: pledgees
    values:
      layout: pledgee

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
